<form [formGroup]="addCommentForm" (ngSubmit)="onSubmit()">
  <div>
    <label for="body">תוכן ההערה</label><br />
    <textarea id="body" formControlName="body" type="text"></textarea>

    @if (addCommentForm.get('body')?.touched && addCommentForm.get('body')?.invalid) {
    <div style="color:red;">
      תוכן ההערה חובה ולפחות 2 תווים.
    </div>
    }
  </div>

  <button type="submit" [disabled]="addCommentForm.invalid">הוסף הערה</button>
</form>
