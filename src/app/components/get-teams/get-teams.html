<ul>
  <button (click)="navigateToAddTeam()">הוספת קבוצה</button>
  @if(isLouding()) {
  <p>טוען...</p>
  }
  @else if(teams().length === 0) {
  <p>לא קיימות קבוצות להצגה.</p>
  }
  @for(team of teams();track team.id) {
  <li style="border:1px solid black; margin:10px; padding:10px;">
    <h4>Team ID: {{team.id}}</h4>
    <h2>Name: {{team.name}}</h2>
    <p>Created At: {{team.created_at}}</p>
    <p>Members Count: {{team.members_count}}</p>
    <button (click)="navigateToProjects(team.id)">כל הפרויקטים</button>
  </li>
  }
</ul>
