<form [formGroup]="addTeamForm" (ngSubmit)="onSubmit()">

  <div>
    <label for="name">שם קבוצה</label><br/>
    <input id="name" formControlName="name"/>
    
    @if (addTeamForm.get('name')?.touched && addTeamForm.get('name')?.invalid) {
      <div style="color:red;">
        שם קבוצה חובה ולפחות 2 תווים.
      </div>
    }
  </div>

  <button type="submit" [disabled]="addTeamForm.invalid">הוסף קבוצה</button>
</form>
